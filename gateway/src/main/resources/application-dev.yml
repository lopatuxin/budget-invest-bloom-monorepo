spring:
  application:
    name: gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          # Валидация через общий HMAC-ключ (Auth сервис не является OIDC-провайдером)
          secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-public
              uri: ${gateway.services.auth-url}
              predicates:
                - Path=/auth/api/login,/auth/api/register,/auth/api/refresh
              filters:
                - PreserveHostHeader

            - id: auth-protected
              uri: ${gateway.services.auth-url}
              predicates:
                - Path=/auth/api/auth/logout
              filters:
                - PreserveHostHeader

            - id: budget
              uri: ${gateway.services.budget-url}
              predicates:
                - Path=/api/budget/**
              filters:
                - UserEnrichmentFilter

            - id: investment
              uri: ${gateway.services.investment-url}
              predicates:
                - Path=/api/investment/**
              filters:
                - UserEnrichmentFilter

  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
    livereload:
      enabled: true

gateway:
  services:
    auth-url: ${AUTH_SERVICE_URL:http://auth:8081}
    budget-url: ${BUDGET_SERVICE_URL:http://budget:8083}
    investment-url: ${INVESTMENT_SERVICE_URL:http://investment-service:8084}
  cors:
    allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:8080}

logging:
  level:
    pyc.lopatuxin.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: INFO

server:
  port: 8082
