databaseChangeLog:
  - logicalFilePath: db/changelog/v1.0.0/008-add-positions-version.yml
  - changeSet:
      id: 008-add-positions-version
      author: investment
      changes:
        - addColumn:
            tableName: positions
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: positions
            columnName: version
